<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Collars</title>
<link rel="icon" href="/favicon.ico" type="image/svg+xml">
<script type="module" src="/src/main.ts"></script>
</head>
<body>

<div class="page-header">
  <div class="header-left">
    <svg viewBox="0 0 32 32" style="width:32px;height:32px;flex-shrink:0"><rect width="32" height="32" rx="6" fill="#1a1a2e" stroke="var(--accent)" stroke-width="2"/><text x="16" y="24" font-size="22" text-anchor="middle">&#x26A1;</text></svg>
  </div>
  <div class="header-right">
    <div class="version mono" id="app-version"></div>
    <div class="indicators" id="indicators">
      <span><span class="dot off" id="dot"></span> <span id="conn-text">Connecting...</span></span>
      <span id="remote-conn-text">&#x2197; off</span>
      <span id="uptime-text"></span>
      <span class="clients-wrapper" id="clients-wrapper"><span id="clients-text"></span><div class="clients-tooltip" id="clients-tooltip"></div></span>
      <span id="heap-text"></span>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="active" onclick="showTab('presets')">Presets</button>
  <button onclick="showTab('remotes')">Remotes</button>
  <button onclick="showTab('debug')">Debug</button>
  <button onclick="showTab('settings')">Settings</button>
</div>

<div class="tab-content" id="tab-remotes">
  <div class="card">
    <div class="form-row">
      <input id="add-name" placeholder="Name">
      <input id="add-id" placeholder="ID (hex)" style="width:90px">
      <select id="add-ch"><option value="0">CH1</option><option value="1">CH2</option><option value="2">CH3</option></select>
      <button class="btn-add" onclick="addRemote()">+ Add</button>
    </div>
  </div>
  <div id="remote-list"></div>
</div>

<div class="tab-content active" id="tab-presets">
  <button class="btn-add" onclick="openPresetEditor(null)" style="margin-bottom:12px">+ New Preset</button>
  <div id="preset-list"></div>
</div>

<div class="tab-content" id="tab-debug">
  <div class="card">
    <div class="debug-toolbar">
      <h3 style="margin:0">Event Log</h3>
      <span id="event-log-status" style="font-size:0.85em;color:var(--text2)">Recording off</span>
    </div>
    <div id="event-log-events" class="event-log-list"></div>
  </div>
  <div class="card">
    <div class="debug-toolbar">
      <h3 style="margin:0">RF Debug</h3>
      <button class="btn-run" id="rf-debug-toggle" onclick="toggleRfDebug()">Start Listening</button>
      <button class="btn-del" onclick="clearRfDebug()">Clear</button>
      <span id="rf-debug-status" style="font-size:0.85em;color:var(--text2)">Receiver idle</span>
    </div>
    <div id="rf-debug-events" class="debug-events"></div>
  </div>
  <div class="card">
    <h3>Stress Test</h3>
    <div class="form-row" style="margin-top:8px">
      <label>Clients</label>
      <input type="number" id="stress-clients" value="3" min="1" max="6" style="width:50px">
      <label>Duration (s)</label>
      <input type="number" id="stress-duration" value="10" min="1" max="60" style="width:50px">
      <button class="btn-run" id="stress-btn" onclick="runStressTest()">Run</button>
    </div>
    <div id="stress-log" style="font-size:0.8em;color:var(--text2);margin-top:8px;max-height:200px;overflow-y:auto;font-family:monospace;white-space:pre-wrap"></div>
  </div>
</div>

<div class="tab-content" id="tab-settings">
  <div class="card">
    <h3>Device Identity</h3>
    <div class="form-row" style="margin-top:8px">
      <label>Device ID</label>
      <input type="text" id="settings-device-id" placeholder="(auto-generated UUID)" style="flex:2">
    </div>
  </div>
  <div class="card" id="card-wifi-sta">
    <h3>WiFi Client (STA)</h3>
    <div class="form-row" style="margin-top:8px">
      <label style="min-width:auto"><input type="checkbox" id="settings-wifi-client-enabled" onchange="updateWifiClientSettingsUi()"> Enable WiFi Client</label>
    </div>
    <div class="form-row" id="settings-wifi-sta-fields-row">
      <label>SSID</label>
      <input type="text" id="settings-wifi-ssid" placeholder="(use build default)">
      <label>Password</label>
      <input type="password" id="settings-wifi-password" placeholder="(use build default)">
    </div>
  </div>
  <div class="card" id="card-wifi-ap">
    <h3>WiFi Access Point</h3>
    <div class="form-row" style="margin-top:8px">
      <label style="min-width:auto"><input type="checkbox" id="settings-ap-enabled"> Enable AP (SSID: rfcollars)</label>
    </div>
    <div class="form-row">
      <label>AP Password</label>
      <input type="text" id="settings-ap-password" placeholder="rfcollars">
    </div>
  </div>
  <div class="card">
    <h3>GPIO Pins</h3>
    <div class="form-row" style="margin-top:8px">
      <label>TX LED</label>
      <input type="number" id="settings-tx-led-pin" min="0" max="54" style="width:60px">
      <label>RX LED</label>
      <input type="number" id="settings-rx-led-pin" min="0" max="54" style="width:60px">
      <label>RF TX</label>
      <input type="number" id="settings-tx-pin" min="0" max="54" style="width:60px">
      <label>RF RX</label>
      <input type="number" id="settings-rx-pin" min="0" max="54" style="width:60px">
    </div>
  </div>
  <div class="card">
    <h3>Server</h3>
    <div class="form-row" style="margin-top:8px">
      <label>Max clients</label>
      <input type="number" id="settings-max-clients" min="1" max="16" style="width:60px">
    </div>
    <div class="form-row">
      <label style="min-width:auto"><input type="checkbox" id="settings-remote-control-enabled" onchange="updateRemoteControlSettingsUi()"> Enable remote control server</label>
    </div>
    <div class="form-row" id="settings-remote-control-url-row">
      <label>WS URL</label>
      <input type="text" id="settings-remote-control-url" placeholder="wss://example.com/device" oninput="updateRemoteControlSettingsUi()">
    </div>
    <div class="form-row" id="settings-remote-control-validate-row">
      <label style="min-width:auto"><input type="checkbox" id="settings-remote-control-validate-cert"> Validate TLS certificate for wss://</label>
    </div>
  </div>
  <div class="card">
    <h3>Time Sync</h3>
    <div class="form-row" style="margin-top:8px">
      <label style="min-width:auto"><input type="checkbox" id="settings-ntp-enabled" onchange="updateNtpSettingsUi()"> Sync clock with NTP</label>
    </div>
    <div class="form-row" id="settings-ntp-server-row">
      <label>NTP Server</label>
      <input type="text" id="settings-ntp-server" placeholder="pool.ntp.org">
    </div>
  </div>
  <div class="card">
    <h3>Diagnostics</h3>
    <div class="form-row" style="margin-top:8px">
      <label style="min-width:auto"><input type="checkbox" id="settings-record-event-log"> Record event log</label>
    </div>
  </div>
  <div class="card">
    <div class="form-row">
      <button class="btn-add" onclick="saveDeviceSettings()">Save Settings</button>
      <button class="btn-del" onclick="rebootDevice()">Reboot</button>
    </div>
    <div id="settings-status" style="font-size:0.85em;color:var(--text2);margin-top:6px"></div>
  </div>
  <div class="card">
    <h3>Firmware Update (OTA)</h3>
    <div class="form-row" style="margin-top:8px">
      <button class="btn-add" id="ota-btn" onclick="document.getElementById('ota-file').click()">Select firmware .bin</button>
      <input type="file" id="ota-file" accept=".bin" style="display:none" onchange="startOta(event)">
    </div>
    <div id="ota-progress" style="display:none;margin-top:8px">
      <div style="background:var(--surface2);border-radius:4px;overflow:hidden;height:20px">
        <div id="ota-bar" style="background:var(--ok);height:100%;width:0%;transition:width 0.3s"></div>
      </div>
      <div id="ota-status" style="font-size:0.85em;color:var(--text2);margin-top:4px"></div>
    </div>
  </div>
  <div class="card">
    <h3>Data</h3>
    <div class="form-row" style="margin-top:8px">
      <button class="btn-export" onclick="doExport()">Export JSON</button>
      <button class="btn-import" onclick="document.getElementById('import-file').click()">Import JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="doImport(event)">
    </div>
  </div>
</div>

<!-- Remote Edit Dialog -->
<div class="editor-overlay" id="remote-editor-overlay">
  <div class="editor" style="max-width:400px">
    <h2 id="remote-editor-title">Edit Remote</h2>
    <input type="hidden" id="remote-editor-original-name">
    <div class="form-row">
      <label>Name</label>
      <input type="text" id="remote-editor-name" placeholder="Remote name">
    </div>
    <div class="form-row">
      <label>ID</label>
      <input type="text" id="remote-editor-id" placeholder="Hex or decimal (e.g. 0x9B7A)">
    </div>
    <div class="form-row">
      <label>Channel</label>
      <select id="remote-editor-ch"><option value="0">CH1</option><option value="1">CH2</option><option value="2">CH3</option></select>
    </div>
    <div class="editor-actions">
      <button onclick="closeRemoteEditor()">Cancel</button>
      <button class="btn-add" onclick="saveRemoteEditor()">Save</button>
    </div>
  </div>
</div>

<!-- Preset editor overlay is created dynamically by ui-shared/preset-editor.ts -->

<button class="stop-fab" id="stop-all-btn" onclick="stopAllRf()">STOP</button>

</body>
</html>
