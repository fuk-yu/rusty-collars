<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rusty Collars Debug Control</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-strong: #1f2630;
      --text: #e6edf3;
      --muted: #9da7b3;
      --accent: #1f8bff;
      --accent-strong: #125ec2;
      --danger: #cc4d5f;
      --danger-strong: #922c3a;
      --border: rgba(255,255,255,0.08);
      --shadow: rgba(0,0,0,0.25);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: radial-gradient(circle at top, #182231, var(--bg) 50%); color: var(--text); font-family: "IBM Plex Sans", "Segoe UI", sans-serif; }
    button, input, select, textarea { font: inherit; }
    button, input, select, textarea { border-radius: 10px; border: 1px solid var(--border); background: var(--panel-strong); color: var(--text); }
    button { padding: 0.7rem 1rem; cursor: pointer; }
    button:hover { border-color: rgba(255,255,255,0.16); }
    button.accent { background: linear-gradient(135deg, var(--accent), var(--accent-strong)); }
    button.danger { background: linear-gradient(135deg, var(--danger), var(--danger-strong)); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    input, select, textarea { width: 100%; padding: 0.7rem 0.8rem; }
    textarea { min-height: 20rem; resize: vertical; font-family: "IBM Plex Mono", monospace; }
    code { font-family: "IBM Plex Mono", monospace; }

    .shell { display: grid; grid-template-columns: 20rem minmax(0, 1fr); min-height: 100vh; }
    .sidebar { padding: 1.25rem; border-right: 1px solid var(--border); background: rgba(10, 14, 19, 0.82); backdrop-filter: blur(18px); }
    .sidebar-header { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; margin-bottom: 1rem; }
    .sidebar-header h1 { margin: 0; font-size: 1.1rem; }
    .meta { color: var(--muted); font-size: 0.88rem; }
    .board-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .board-card { width: 100%; text-align: left; padding: 0.9rem; background: var(--panel); box-shadow: 0 10px 24px var(--shadow); }
    .board-card-active { border-color: rgba(31, 139, 255, 0.65); box-shadow: 0 0 0 1px rgba(31, 139, 255, 0.25), 0 10px 24px var(--shadow); }
    .board-card-top { display: flex; justify-content: space-between; gap: 1rem; margin-bottom: 0.35rem; }
    .board-card-body { display: flex; flex-direction: column; gap: 0.2rem; color: var(--muted); font-size: 0.86rem; }

    .main { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .panel { background: rgba(22, 27, 34, 0.9); border: 1px solid var(--border); border-radius: 18px; padding: 1rem 1.1rem; box-shadow: 0 16px 40px var(--shadow); }
    .panel-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
    .panel-header h2 { margin: 0 0 0.2rem; font-size: 1.05rem; }
    .toolbar, .button-row, .row-actions, .button-stack { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .button-stack { flex-direction: column; }
    .grid { display: grid; gap: 0.9rem; }
    .grid-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 0.9rem; }
    label { display: flex; flex-direction: column; gap: 0.45rem; }
    label span { color: var(--muted); font-size: 0.88rem; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.9rem; }
    .stats div { padding: 0.9rem; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
    .stats span { display: block; color: var(--muted); font-size: 0.82rem; margin-bottom: 0.25rem; }
    .stats strong { font-size: 1rem; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { text-align: left; padding: 0.8rem 0.55rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    .table th { color: var(--muted); font-size: 0.84rem; font-weight: 600; }
    .preset-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(20rem, 34rem); gap: 1rem; }
    .preset-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .preset-card { border: 1px solid var(--border); border-radius: 14px; padding: 0.85rem; background: rgba(255,255,255,0.03); }
    .preset-card-top { display: flex; justify-content: space-between; gap: 1rem; margin-bottom: 0.4rem; }
    .preset-card-body { color: var(--muted); font-size: 0.88rem; margin-bottom: 0.7rem; }
    .stacked { display: flex; flex-direction: column; gap: 0.5rem; }
    .event-list { display: flex; flex-direction: column; gap: 0.55rem; max-height: 28rem; overflow-y: auto; }
    .event-item { display: grid; grid-template-columns: 12rem 9rem 1fr; gap: 0.85rem; padding: 0.7rem 0.8rem; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04); }
    .event-time, .event-source { color: var(--muted); font-size: 0.84rem; }
    .event-source { text-transform: uppercase; letter-spacing: 0.04em; }
    .banner { padding: 0.9rem 1rem; border-radius: 14px; border: 1px solid var(--border); }
    .banner-info { background: rgba(31, 139, 255, 0.16); }
    .banner-error { background: rgba(204, 77, 95, 0.16); }
    .error-box { margin-top: 1rem; padding: 0.8rem 0.9rem; border-radius: 12px; background: rgba(204, 77, 95, 0.12); color: #ffc7ce; }
    .empty, .empty-row, .empty-panel p { color: var(--muted); }
    .empty-panel { padding: 2rem; }

    @media (max-width: 1200px) {
      .grid-5, .grid-4, .grid-2, .stats, .preset-layout { grid-template-columns: 1fr 1fr; }
      .event-item { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
      .grid-5, .grid-4, .grid-2, .stats, .preset-layout { grid-template-columns: 1fr; }
    }

    /* Preset editor styles are now injected by ui-shared/preset-editor.ts */
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/client.js"></script>
</body>
</html>
